<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 개인 연차 관리 매니저</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            color: #2c3e50;
            font-size: 24px;
        }

        .season-info {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
            font-weight: 500;
            word-break: keep-all;
        }

        /* 4열 대시보드 스타일 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .card {
            background: #f8fafc;
            padding: 15px 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .card h3 {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
            word-break: keep-all;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
            color: #0f172a;
        }

        .card.total p { color: #475569; }
        .card.used p { color: #dc2626; }
        .card.remain p { color: #16a34a; }
        .card.final p { color: #2563eb; }

        /* 백업/복원 섹션 스타일 */
        .backup-section {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 20px;
        }

        .btn-backup {
            background: #64748b;
            font-size: 12px;
            padding: 6px 12px;
        }
        .btn-backup:hover {
            background: #475569;
        }

        /* 설정 및 입력 폼 */
        .settings-section, .input-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .form-group > label {
            font-size: 14px;
            color: #475569;
        }

        input, select, button {
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #3b82f6;
        }

        button {
            background: #2563eb;
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .btn-edit { background: #0ea5e9; }
        .btn-edit:hover { background: #0284c7; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-success { background: #16a34a; }
        .btn-success:hover { background: #15803d; }

        /* 리스트 테이블 레이아웃 */
        .history-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-top: 25px;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto; /* 모바일에서 표가 너무 크면 깨지지 않고 스크롤되도록 방지 */
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
            min-width: 500px; /* 테이블이 너무 쪼개지는 것 방지 */
        }

        th, td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .no-data {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .table-input {
            width: 100%;
            padding: 6px 10px;
            font-size: 13px;
        }

        /* 상태 배지 */
        .badge {
            display: inline-block;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
        .badge.upcoming {
            background-color: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }
        .badge.past {
            background-color: #f1f5f9;
            color: #475569;
        }
        .badge.out-of-season {
            background-color: #f1f5f9;
            color: #94a3b8;
            border: 1px solid #cbd5e1;
        }
        .d-day {
            font-weight: bold;
            color: #ea580c;
            margin-left: 2px;
            margin-right: 2px;
        }
        .action-btns {
            display: flex;
            gap: 4px;
            justify-content: center;
        }

        /* ========================================================
           📱 모바일 반응형 스타일 최적화 (화면 폭 768px 이하일 때)
           ======================================================== */
        @media (max-width: 768px) {
            body {
                padding: 15px 10px;
            }

            .container {
                padding: 15px;
            }

            h1 {
                font-size: 20px;
            }

            /* 대시보드를 2열 2줄로 배치 */
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .card {
                padding: 12px 5px;
            }

            .card h3 {
                font-size: 12px;
            }

            .card p {
                font-size: 18px;
            }

            /* 백업 버튼 정렬 */
            .backup-section {
                justify-content: center;
                width: 100%;
            }
            .btn-backup {
                flex: 1;
                text-align: center;
            }

            /* 입력 폼 요소들을 가득 차게 정렬 */
            .form-group {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .form-group > label {
                margin-left: 0 !important;
                margin-top: 4px;
            }

            input, select, button {
                width: 100% !important;
                text-align: center;
            }

            /* 테이블 내 글자 크기 조정 */
            table {
                font-size: 12px;
            }
            
            th, td {
                padding: 10px 5px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 나의 연차 관리 매니저</h1>
    <div class="season-info" id="current-season-text">연차 산정 기간: 계산 중...</div>

    <!-- 1. 4단 연차 현황판 (모바일 2x2 변경됨) -->
    <div class="dashboard">
        <div class="card total">
            <h3>이번 시즌 총 연차</h3>
            <p id="display-total">0개</p>
        </div>
        <div class="card used">
            <h3>시즌 내 사용 연차</h3>
            <p id="display-used">0개</p>
        </div>
        <div class="card remain">
            <h3>현재 잔여 연차</h3>
            <p id="display-remain">0개</p>
        </div>
        <div class="card final">
            <h3>최종 예상 잔여</h3>
            <p id="display-final">0개</p>
        </div>
    </div>

    <!-- 백업 및 복원 컨트롤 버튼 영역 -->
    <div class="backup-section">
        <button class="btn-backup" onclick="exportData()">💾 백업</button>
        <button class="btn-backup" onclick="document.getElementById('import-file').click()">📂 복원</button>
        <input type="file" id="import-file" accept=".txt" style="display: none;" onchange="importData(event)">
    </div>

    <!-- 2. 기본 연차 설정 -->
    <div class="settings-section">
        <div class="section-title">⚙️ 연차 기본 정보 설정</div>
        <div class="form-group">
            <label for="total-leave-input">매년 부여 개수:</label>
            <input type="number" id="total-leave-input" min="0" max="100" step="0.5" placeholder="예: 15">
            
            <label for="reset-date-input">입사일(리셋일):</label>
            <input type="text" id="reset-date-input" placeholder="MM-DD 형식 (예: 08-04)" maxlength="5">
            
            <button onclick="saveSettings()">설정 및 저장</button>
        </div>
    </div>

    <!-- 3. 연차 사용 등록 -->
    <div class="input-section">
        <div class="section-title">✍️ 연차 등록 (미리 등록 가능)</div>
        <div class="form-group">
            <input type="date" id="leave-date" required>
            <select id="leave-type">
                <option value="1">종일 (1.0)</option>
                <option value="0.5">오전반차 (0.5)</option>
                <option value="0.5">오후반차 (0.5)</option>
                <option value="0.25">반반차 (0.25)</option>
            </select>
            <input type="text" id="leave-memo" placeholder="사유 (예: 여름휴가, 병원)">
            <button onclick="addLeaveRecord()">등록하기</button>
        </div>
    </div>

    <!-- 4. 내역 세션 (모바일 스크롤 랩핑 적용) -->
    <div class="history-grid">
        <div class="history-section">
            <div class="section-title" style="color: #2563eb;">🚀 다가오는 예정된 연차</div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 18%;">날짜</th>
                            <th style="width: 15%;">종류</th>
                            <th style="width: 10%;">차감</th>
                            <th style="width: 42%;">사유 및 상태</th>
                            <th style="width: 15%;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="upcoming-tbody"></tbody>
                </table>
            </div>
            <div id="no-upcoming-msg" class="no-data">예정된 휴가 계획이 없습니다. 푹 쉬어보세요!</div>
        </div>

        <div class="history-section">
            <div class="section-title" style="color: #475569;">📋 이미 지나간 사용 내역</div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 18%;">날짜</th>
                            <th style="width: 15%;">종류</th>
                            <th style="width: 10%;">차감</th>
                            <th style="width: 42%;">사유 및 상태</th>
                            <th style="width: 15%;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="past-tbody"></tbody>
                </table>
            </div>
            <div id="no-past-msg" class="no-data">과거에 사용한 연차 내역이 없습니다.</div>
        </div>
    </div>
</div>

<script>
    let totalLeave = parseFloat(localStorage.getItem('totalLeave')) || 15;
    let resetDateStr = localStorage.getItem('resetDateStr') || "08-04";
    let leaveRecords = JSON.parse(localStorage.getItem('leaveRecords')) || [];
    let editingId = null;

    document.getElementById('total-leave-input').value = totalLeave;
    document.getElementById('reset-date-input').value = resetDateStr;
    
    function getLeaveSeasonRange(targetDate = new Date()) {
        const currentYear = targetDate.getFullYear();
        const [resetMonth, resetDay] = resetDateStr.split('-').map(Number);
        let seasonStart = new Date(currentYear, resetMonth - 1, resetDay, 0, 0, 0, 0);
        if (targetDate < seasonStart) {
            seasonStart.setFullYear(currentYear - 1);
        }
        let seasonEnd = new Date(seasonStart);
        seasonEnd.setFullYear(seasonStart.getFullYear() + 1);
        seasonEnd.setDate(seasonEnd.getDate() - 1);
        seasonEnd.setHours(23,59,59,999);
        return { start: seasonStart, end: seasonEnd };
    }

    function saveSettings() {
        const inputVal = parseFloat(document.getElementById('total-leave-input').value);
        const inputDate = document.getElementById('reset-date-input').value.trim();
        const dateRegex = /^(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])$/;

        if (isNaN(inputVal) || inputVal < 0) {
            alert('올바른 연차 개수를 입력해주세요.');
            return;
        }
        if (!dateRegex.test(inputDate)) {
            alert('입사일(리셋일)을 MM-DD 형식(예: 08-04)으로 입력해주세요.');
            return;
        }

        totalLeave = inputVal;
        resetDateStr = inputDate;
        localStorage.setItem('totalLeave', totalLeave);
        localStorage.setItem('resetDateStr', resetDateStr);
        saveAndReload();
    }

    function updateDashboard() {
        const today = new Date();
        today.setHours(0,0,0,0);
        const season = getLeaveSeasonRange(today);
        
        const startText = season.start.toISOString().split('T')[0];
        const endText = season.end.toISOString().split('T')[0];
        document.getElementById('current-season-text').innerText = `📅 현재 연차 산정 기간: ${startText} ~ ${endText}`;

        let pastUsedLeave = 0;
        let upcomingLeave = 0;

        leaveRecords.forEach(record => {
            const recordDate = new Date(record.date);
            if (recordDate >= season.start && recordDate <= season.end) {
                recordDate.setHours(0,0,0,0);
                if (recordDate >= today) {
                    upcomingLeave += record.amount;
                } else {
                    pastUsedLeave += record.amount;
                }
            }
        });

        const currentRemain = totalLeave - pastUsedLeave;
        const finalExpectedRemain = currentRemain - upcomingLeave;

        document.getElementById('display-total').innerText = `${totalLeave}개`;
        document.getElementById('display-used').innerText = `${pastUsedLeave}개`;
        document.getElementById('display-remain').innerText = `${currentRemain}개`;
        document.getElementById('display-final').innerText = `${finalExpectedRemain}개`;
    }

    function exportData() {
        const dataObj = { totalLeave: totalLeave, resetDateStr: resetDateStr, leaveRecords: leaveRecords };
        const dataStr = JSON.stringify(dataObj, null, 2);
        const blob = new Blob([dataStr], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const todayStr = new Date().toISOString().split('T')[0];
        link.href = url;
        link.download = `leave_data_${todayStr}.txt`;
        link.click();
        URL.revokeObjectURL(url);
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const parsedData = JSON.parse(e.target.result);
                if (parsedData.totalLeave !== undefined && parsedData.resetDateStr && Array.isArray(parsedData.leaveRecords)) {
                    if (confirm("파일의 데이터로 기존 연차 정보를 덮어씌우시겠습니까?")) {
                        totalLeave = parsedData.totalLeave;
                        resetDateStr = parsedData.resetDateStr;
                        leaveRecords = parsedData.leaveRecords;

                        localStorage.setItem('totalLeave', totalLeave);
                        localStorage.setItem('resetDateStr', resetDateStr);
                        localStorage.setItem('leaveRecords', JSON.stringify(leaveRecords));

                        document.getElementById('total-leave-input').value = totalLeave;
                        document.getElementById('reset-date-input').value = resetDateStr;

                        saveAndReload();
                        alert("데이터 복원이 완료되었습니다!");
                    }
                } else {
                    alert("올바른 연차 데이터 파일이 아닙니다.");
                }
            } catch (err) {
                alert("파일을 읽는 중 오류가 발생했습니다.");
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function addLeaveRecord() {
        const dateInput = document.getElementById('leave-date').value;
        const typeSelect = document.getElementById('leave-type');
        const typeText = typeSelect.options[typeSelect.selectedIndex].text.split(' ')[0];
        const amount = parseFloat(typeSelect.value);
        const memo = document.getElementById('leave-memo').value.trim() || '없음';

        if (!dateInput) {
            alert('날짜를 선택해 주세요.');
            return;
        }

        const newRecord = { id: Date.now(), date: dateInput, type: typeText, amount: amount, memo: memo };
        leaveRecords.push(newRecord);
        sortRecords();
        saveAndReload();
        document.getElementById('leave-date').value = '';
        document.getElementById('leave-memo').value = '';
    }

    function sortRecords() {
        leaveRecords.sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    function saveAndReload() {
        localStorage.setItem('leaveRecords', JSON.stringify(leaveRecords));
        updateDashboard();
        renderHistory();
    }

    function deleteRecord(id) {
        if (confirm('이 연차 기록을 삭제하시겠습니까?')) {
            leaveRecords = leaveRecords.filter(record => record.id !== id);
            saveAndReload();
        }
    }

    function startEdit(id) { editingId = id; renderHistory(); }
    function cancelEdit() { editingId = null; renderHistory(); }

    function saveEdit(id) {
        const row = document.getElementById(`row-${id}`);
        const newDate = row.querySelector('.edit-date').value;
        const typeSelect = row.querySelector('.edit-type');
        const newTypeText = typeSelect.options[typeSelect.selectedIndex].text.split(' ')[0];
        const newAmount = parseFloat(typeSelect.value);
        const newMemo = row.querySelector('.edit-memo').value.trim() || '없음';

        if (!newDate) {
            alert('날짜를 선택해 주세요.');
            return;
        }

        leaveRecords = leaveRecords.map(record => {
            if (record.id === id) {
                return { ...record, date: newDate, type: newTypeText, amount: newAmount, memo: newMemo };
            }
            return record;
        });

        editingId = null;
        sortRecords();
        saveAndReload();
    }

    function renderHistory() {
        const upcomingTbody = document.getElementById('upcoming-tbody');
        const pastTbody = document.getElementById('past-tbody');
        upcomingTbody.innerHTML = '';
        pastTbody.innerHTML = '';

        const today = new Date();
        today.setHours(0,0,0,0);
        const season = getLeaveSeasonRange(today);

        let upcomingCount = 0;
        let pastCount = 0;

        leaveRecords.forEach(record => {
            const recordDate = new Date(record.date);
            const isInCurrentSeason = (recordDate >= season.start && recordDate <= season.end);
            recordDate.setHours(0,0,0,0);

            const tr = document.createElement('tr');
            tr.id = `row-${record.id}`;

            const isUpcoming = recordDate >= today;
            if (isUpcoming) upcomingCount++; else pastCount++;

            const getSelectHtml = (currentAmount) => `
                <select class="table-input edit-type">
                    <option value="1" ${currentAmount === 1 ? 'selected' : ''}>종일 (1.0)</option>
                    <option value="0.5" ${currentAmount === 0.5 ? 'selected' : ''}>반차 (0.5)</option>
                    <option value="0.25" ${currentAmount === 0.25 ? 'selected' : ''}>반반차 (0.25)</option>
                </select>
            `;

            if (editingId === record.id) {
                tr.innerHTML = `
                    <td><input type="date" class="table-input edit-date" value="${record.date}"></td>
                    <td>${getSelectHtml(record.amount)}</td>
                    <td>-</td>
                    <td><input type="text" class="table-input edit-memo" value="${record.memo}"></td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-success" style="padding: 4px 6px; font-size: 11px;" onclick="saveEdit(${record.id})">저장</button>
                            <button style="padding: 4px 6px; font-size: 11px; background: #64748b;" onclick="cancelEdit()">취소</button>
                        </div>
                    </td>
                `;
                if (isUpcoming) upcomingTbody.appendChild(tr); 
                else pastTbody.insertBefore(tr, pastTbody.firstChild);
            } else {
                if (isUpcoming) {
                    const diffTime = recordDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    const dDayText = diffDays === 0 ? "Today" : `D-${diffDays}`;

                    tr.innerHTML = `
                        <td><b style="color: #2563eb;">${record.date}</b></td>
                        <td>${record.type}</td>
                        <td><strong>${record.amount}</strong></td>
                        <td style="text-align: left; padding-left: 10px;">
                            <span class="badge upcoming">예정</span>
                            <span class="d-day">${dDayText}</span> | ${record.memo}
                        </td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-edit" style="padding: 4px 6px; font-size: 11px;" onclick="startEdit(${record.id})">수정</button>
                                <button class="btn-danger" style="padding: 4px 6px; font-size: 11px;" onclick="deleteRecord(${record.id})">취소</button>
                            </div>
                        </td>
                    `;
                    upcomingTbody.appendChild(tr);
                } else {
                    const badgeHtml = isInCurrentSeason 
                        ? `<span class="badge past">완료</span>` 
                        : `<span class="badge out-of-season">이전</span>`;

                    tr.innerHTML = `
                        <td style="color: #64748b;">${record.date}</td>
                        <td>${record.type}</td>
                        <td>${record.amount}</td>
                        <td style="text-align: left; padding-left: 10px; color: #64748b;">
                            ${badgeHtml} | ${record.memo}
                        </td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-edit" style="padding: 4px 6px; font-size: 11px; opacity: 0.7;" onclick="startEdit(${record.id})">수정</button>
                                <button class="btn-danger" style="padding: 4px 6px; font-size: 11px; opacity: 0.6;" onclick="deleteRecord(${record.id})">삭제</button>
                            </div>
                        </td>
                    `;
                    pastTbody.insertBefore(tr, pastTbody.firstChild);
                }
            }
        });

        document.getElementById('no-upcoming-msg').style.display = upcomingCount === 0 ? 'block' : 'none';
        document.getElementById('no-past-msg').style.display = pastCount === 0 ? 'block' : 'none';
    }

    updateDashboard();
    renderHistory();
</script>

</body>
</html>
